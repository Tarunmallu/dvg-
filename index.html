<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemoriesX | Creative Printing</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    background: black;
}

.logo {
    width: 200px;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 15px;
    text-align: center;
}

.card img {
    width: 100%;
    height: 150px;
    border-radius: 15px;
    object-fit: cover;
}

.price {
    color: #ff4dff;
    font-weight: bold;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 15px;
    background: #25D366;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    cursor: pointer;
}

/* FILE INPUT */
input[type="file"] {
    margin-top: 10px;
    color: white;
}

/* WHATSAPP FLOAT */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
    color: white;
    font-size: 20px;
    text-decoration: none;
}

footer {
    text-align: center;
    padding: 15px;
    background: black;
}
</style>

<script>
function orderNow(product, price) {
    let message = "Hello, I want to order:\n" + product + " - " + price + 
                  "\nI will send my photo here.";
    let url = "https://wa.me/9036351517?text=" + encodeURIComponent(message);
    window.open(url, "_blank");
}
</script>

</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <h2>📦 Order Your Frame</h2>
</header>

<!-- FRAME SECTION -->
<div class="container">

<div class="card">
    <h3>8x12 Frame</h3>
    <p class="price">₹499</p>
    <input type="file">
    <button class="btn" onclick="orderNow('8x12 Frame','₹499')">Order on WhatsApp</button>
</div>

<div class="card">
    <h3>12x18 Frame 🔥</h3>
    <p class="price">₹899</p>
    <input type="file">
    <button class="btn" onclick="orderNow('12x18 Frame','₹899')">Order on WhatsApp</button>
</div>

<div class="card">
    <h3>12x24 Frame</h3>
    <p class="price">₹1199</p>
    <input type="file">
    <button class="btn" onclick="orderNow('12x24 Frame','₹1199')">Order on WhatsApp</button>
</div>

<div class="card">
    <h3>12x30 Frame</h3>
    <p class="price">₹1399</p>
    <input type="file">
    <button class="btn" onclick="orderNow('12x30 Frame','₹1399')">Order on WhatsApp</button>
</div>

<div class="card">
    <h3>12x36 Frame</h3>
    <p class="price">₹1499</p>
    <input type="file">
    <button class="btn" onclick="orderNow('12x36 Frame','₹1499')">Order on WhatsApp</button>
</div>

<div class="card">
    <h3>16x24 Frame</h3>
    <p class="price">₹2299</p>
    <input type="file">
    <button class="btn" onclick="orderNow('16x24 Frame','₹2299')">Order on WhatsApp</button>
</div>

<div class="card">
    <h3>20x30 Frame</h3>
    <p class="price">₹3299</p>
    <input type="file">
    <button class="btn" onclick="orderNow('20x30 Frame','₹3299')">Order on WhatsApp</button>
</div>

<div class="card">
    <h3>24x36 Frame</h3>
    <p class="price">₹6299</p>
    <input type="file">
    <button class="btn" onclick="orderNow('24x36 Frame','₹6299')">Order on WhatsApp</button>
</div>

</div>

<a class="whatsapp" href="https://wa.me/9036351517" target="_blank">💬</a>

<footer>
    © 2026 MemoriesX | Scan. Watch. Cherish.
</footer>

</body>
</html>
